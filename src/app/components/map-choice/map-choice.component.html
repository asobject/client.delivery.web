<div class="container">
  <div  class="skeleton-container" *ngIf="loadingMap">
    <p-skeleton width="100%" height="100%" class="mb-2"></p-skeleton>
  </div>
    <div *ngIf="!loadingMap" id="map" #mapContainer class="map-container"></div>
</div>
<div class="card flex justify-center">
<p-confirmDialog [style]="{ width: '400px' }">
  <ng-template  #message let-message>

    <div class="flex flex-column gap-3">
      <div class="flex flex-column gap-1">
        <small class="text-muted">Наименование пункта</small>
        <div class="font-semibold">{{ selectedPoint.name }}</div>
      </div>

      <div class="flex flex-column gap-1">
        <small class="text-muted">Адрес</small>
        <div>{{ selectedPoint.address }}</div>
      </div>
      <div class="flex flex-column gap-1">
        <small class="text-muted">Тип</small>
        <div>{{ getPointTypeLabel(selectedPoint.pointType) }}</div>
      </div>
    </div>
  </ng-template>
</p-confirmDialog>
</div>
