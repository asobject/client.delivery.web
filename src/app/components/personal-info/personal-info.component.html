<div class="container flex justify-content-center flex-wrap">
  <div class="w-max">
    <p-card class="" header="Личная информация">
      <form [formGroup]="personalForm">
        <p-inputgroup styleClass="w-fill">
          <p-floatlabel variant="in">
            <input id="firstName" type="text" class="w-full" pInputText formControlName="firstName"/>
            <label for="firstName">Имя</label>
          </p-floatlabel>
          <p-inputgroup-addon>
            <p-button icon="pi pi-user-edit" [loading]="loadingFirstName" styleClass="p-3" severity="primary" (click)="editFirstName()"/>
          </p-inputgroup-addon>
        </p-inputgroup>
        <p-inputgroup styleClass="w-fill mt-2">
          <p-floatlabel variant="in">
            <input id="lastName" type="text" class="w-full" pInputText formControlName="lastName"/>
            <label for="lastName">Фамилия</label>
          </p-floatlabel>
          <p-inputgroup-addon>
            <p-button
              icon="pi pi-user-edit"
              styleClass="p-3"
              severity="primary"
              [loading]="loadingLastName"
              (click)="editLastName()"
            />
          </p-inputgroup-addon>
        </p-inputgroup>
      </form>
    </p-card>
    <div class="mt-2">
      <p-card header="Подтвеждение аккаунта">
        <p-button styleClass="p-0" label="{{payload.emailVerified ? 'Аккаунт подтвержден' : 'Аккаунт не подтвежден'}}"
                  variant="text"
                  link="{{payload.emailVerified ? 'false' : 'true'}}"
                  [severity]="payload.emailVerified ? 'success' : 'warn'"
                  (click)="sendEmailConfirmation()"
        />
      </p-card>
    </div>
    <div class="mt-2">

      <p-card header="Безопасность">
        <div class="flex flex-column">
          <div class="flex align-items-center justify-content-center w-full">

            <p-button styleClass="mt-2 w-full" class="w-full" severity="primary" label="Изменить почту"/>
          </div>
          <div class="flex align-items-center justify-content-center w-full">
            <p-button styleClass="mt-2 w-full" class="w-full" severity="primary" label="Изменить пароль"/>
          </div>
        </div>
      </p-card>
    </div>

  </div>
</div>
