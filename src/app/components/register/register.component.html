<div class="container">
  <p-card header="Регистрация" class="register-card">
    <form [formGroup]="registerForm" (ngSubmit)="submit()">
      <p-floatlabel variant="in">
        <input id="firstName" type="text" class="w-full" pInputText formControlName="firstName" />
        <label for="firstName">Имя</label>
      </p-floatlabel>
      <p-floatlabel variant="in" class="mt-3">
        <input id="email" type="email" class="w-full" pInputText formControlName="email" />
        <label for="email">Электронная почта</label>
      </p-floatlabel>
      <p-floatlabel variant="in" class="mt-3">
        <input id="password" type="password"  class="w-full" pInputText formControlName="password" />
        <label for="password">Пароль</label>
      </p-floatlabel>
      <p-floatlabel variant="in" class="mt-3">
        <input id="confirmPassword" type="password"  [ngClass]="{'ng-invalid ng-dirty': registerForm.hasError('mismatch') && registerForm.get('confirmPassword')?.touched}" class="w-full" pInputText formControlName="confirmPassword" />
        <label for="confirmPassword">Повторите пароль</label>
      </p-floatlabel>
      <p-button label="Уже есть аккаунт?" styleClass="pl-0" size="small" routerLink="/login" [link]="true" />
      <button pButton pRipple class="w-full mt-1" type="submit" label="Зарегистрировать" icon="pi pi-user-plus"></button>
    </form>
  </p-card>
</div>
